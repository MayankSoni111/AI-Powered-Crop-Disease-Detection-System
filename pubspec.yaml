name: crop_disease_detection
description: AI Powered Smart Crop Disease Detection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

  # State Management
  provider: ^6.1.1

  # Camera & Image
  image_picker: ^1.0.7

  # Network
  http: ^1.2.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1

  # Phone/URL
  url_launcher: ^6.2.4

  # Permissions
  permission_handler: ^11.3.0

  # Text-to-Speech (Voice Over)
  flutter_tts: ^3.8.5

  # Speech-to-Text (Voice Input)
  speech_to_text: ^6.6.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
